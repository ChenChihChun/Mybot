name: Mybot Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's/[^0-9]*//g')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "### Build Info" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| App Version | v${VERSION_NAME} (code ${VERSION_CODE}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Create debug keystore if not cached
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 36500 -storepass android -keypass android \
              -dname "CN=Mybot Debug,O=Mybot,C=TW"
          fi

      - name: Print debug keystore SHA-1
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android 2>/dev/null | grep -E "SHA1|SHA-1" | head -1
          echo "### Signing Info" >> "$GITHUB_STEP_SUMMARY"
          SHA1=$(keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android 2>/dev/null | grep -E "SHA1|SHA-1" | head -1 | sed 's/.*: //')
          echo "| SHA-1 | \`${SHA1}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | com.mybot.app |" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5.1'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Get APK size
        id: apk
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "size=$SIZE" >> "$GITHUB_OUTPUT"
            echo "### Build Result" >> "$GITHUB_STEP_SUMMARY"
            echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Success |" >> "$GITHUB_STEP_SUMMARY"
            echo "| APK Size | ${SIZE}B |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Artifact | mybot-v${{ steps.version.outputs.name }}-debug.apk |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mybot-v${{ steps.version.outputs.name }}-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
